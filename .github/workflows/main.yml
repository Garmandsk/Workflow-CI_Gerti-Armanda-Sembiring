name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PREPROCESSING_DATASET_URL: "MLproject/email_preprocessing.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.11
      - name: Set up Python 3.12.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.11"

      # Check Env Variables (Perbaikan nama variabel)
      - name: Check Env
        run: |
          echo $PREPROCESSING_DATASET_URL
          
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLproject/requirements.txt

      - name: Run mlflow project
        run: |
          mlflow run MLproject --env-manager=local

      # Simpan Artefak ke GitHub
      - name: Upload to Github
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLproject/mlruns/
          retention-days: 7

      # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          cd MLproject
          RUN_ID=$(python -c "from mlflow.tracking import MlflowClient; client = MlflowClient(); print(client.search_runs(['0'], order_by=['start_time DESC'], max_results=1)[0].info.run_id)")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      # Build & Push Docker
      - name: Build Docker Model
        run: |
          cd MLproject
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "smsml_gerti-armanda-sembiring"

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest

      # Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest