name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PREPROCESSING_DATASET_URL: "MLproject/email_preprocessing.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.11
      - name: Set up Python 3.12.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.11"

      # Check Env Variables (Perbaikan nama variabel)
      - name: Check Env
        run: |
          echo $PREPROCESSING_DATASET_URL
          
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLproject/requirements.txt
      
      # Run mlflow 
      - name: Run mlflow project
        run: |
          mlflow run MLproject --env-manager=local

      # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          cd MLproject
          RUN_ID=$(python -c "from mlflow.tracking import MlflowClient; client = MlflowClient(); print(client.search_runs(['0'], order_by=['start_time DESC'], max_results=1)[0].info.run_id)")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      # Upload to GitHub
      - name: Set up Git LFS
        run: |
          git config --global user.name "${{ secrets.USERNAME }}"
          git config --global user.email "${{ secrets.EMAIL }}"
          git lfs install
          git lfs track "mlruns/**"
          git add .gitattributes
          git commit -m "Track large files in mlruns with LFS" || true
          git push origin main

      - name: Upload to Github
        run: |
          git config --global user.name "${{ secrets.GH_USERNAME }}"
          git config --global user.email "${{ secrets.GH_EMAIL }}"
          git add -f mlruns/
          git commit -m "Save mlruns from CI run" || true
          git push origin main

      # Build & Push Docker
      - name: Build Docker Model
        run: |
          cd MLproject
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "smsml_gerti-armanda-sembiring"

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag smsml_gerti-armanda-sembiring ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_gerti-armanda-sembiring:latest

      # Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_gerti-armanda-sembiring:latest