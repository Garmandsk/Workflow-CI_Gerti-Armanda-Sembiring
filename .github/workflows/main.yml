name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PREPROCESSING_DATASET_URL: "MLproject/email_preprocessing.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.11
      - name: Set up Python 3.12.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.11"

      # Check Env Variables (Perbaikan nama variabel)
      - name: Check Env
        run: |
          echo $PREPROCESSING_DATASET_URL
          
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLproject/requirements.txt
      
      # Run mlflow 
      - name: Run mlflow project
        run: |
          cd MLproject
          mlflow run . --env-manager=local

      # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          cd MLproject
          RUN_ID=$(python -c "from mlflow.tracking import MlflowClient; client = MlflowClient(); runs = client.search_runs(['0'], filter_string=\"tags.mlflow.runName = 'RF_Hyperopt_CV_Pipeline'\", order_by=['start_time DESC']); print(runs[0].info.run_id)")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"
      
      # Upload to Github (1)
      - name: Set up Git LFS
        run: |
          cd MLproject
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "mlruns/**"
          git add .gitattributes
          git commit -m "Track large files in mlruns with LFS [skip ci]" || echo "No changes to LFS"

      - name: Upload MLflow artifacts to Github
        run: |
          cd MLproject
          git add -f mlruns/
          git commit -m "Save mlruns from CI run[skip ci]" || echo "No changes to commit
          git push origin main

      # Upload to GitHub (2)
      # - name: Upload MLflow artifacts to Github
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: mlruns-artifact
      #     path: MLproject/mlruns/
      #     retention-days: 7

      # Build & Push Docker
      - name: Build Docker Model
        run: |
          cd MLproject
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "smsml_gerti-armanda-sembiring"

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag smsml_gerti-armanda-sembiring ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_gerti-armanda-sembiring:latest

      # Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_gerti-armanda-sembiring:latest